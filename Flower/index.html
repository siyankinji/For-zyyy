

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pink Tulip Bloom</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0515;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      font-family: sans-serif;
    }

    /* ── Sky gradient ── */
    .sky {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 50% 120%, #3a0030 0%, #1a0025 40%, #0d0515 100%);
    }

    /* ── Stars ── */
    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }
    .star {
      position: absolute;
      border-radius: 50%;
      background: #fff;
      animation: twinkle var(--dur, 3s) ease-in-out infinite alternate;
      animation-delay: var(--del, 0s);
      opacity: 0.6;
    }
    @keyframes twinkle { from { opacity: 0.2; } to { opacity: 0.9; } }

    /* ── Ground ── */
    .ground {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 80px;
      background: linear-gradient(to top, #1a0a1e, #2d1040);
      border-radius: 60% 60% 0 0 / 30px 30px 0 0;
    }

    /* ── Scene ── */
    .scene {
      position: fixed;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%);
      width: 700px;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      gap: 0;
    }

    /* ══════════════════════════════════════
       TULIP COMPONENT
    ══════════════════════════════════════ */
    .tulip {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      transform-origin: bottom center;
    }

    /* Stem */
    .stem {
      width: 6px;
      border-radius: 3px;
      background: linear-gradient(to top, #2d6a2d, #4caf50);
      transform-origin: bottom center;
      animation: stemGrow 1.2s cubic-bezier(0.22,1,0.36,1) forwards;
      animation-delay: var(--stem-delay, 0s);
      transform: scaleY(0);
    }
    @keyframes stemGrow {
      from { transform: scaleY(0); }
      to   { transform: scaleY(1); }
    }

    /* Stem leaf */
    .stem-leaf {
      position: absolute;
      width: 28px;
      height: 14px;
      background: linear-gradient(135deg, #3d8b3d, #5cb85c);
      border-radius: 50% 0 50% 0;
      transform-origin: left center;
      animation: leafOpen 0.8s ease-out forwards;
      animation-delay: var(--leaf-delay, 0.8s);
      opacity: 0;
    }
    .stem-leaf.right {
      right: 100%;
      top: var(--leaf-top, 40%);
      transform: rotate(-30deg) scaleX(0);
      border-radius: 0 50% 0 50%;
      right: auto;
      left: 100%;
      transform-origin: left center;
    }
    .stem-leaf.left {
      left: auto;
      right: 100%;
      top: var(--leaf-top, 55%);
      transform-origin: right center;
      transform: rotate(30deg) scaleX(0) scaleY(-1);
    }
    @keyframes leafOpen {
      from { opacity: 1; transform: rotate(-30deg) scaleX(0); }
      to   { opacity: 1; transform: rotate(-30deg) scaleX(1); }
    }
    .stem-leaf.left {
      animation-name: leafOpenLeft;
    }
    @keyframes leafOpenLeft {
      from { opacity: 1; transform: rotate(150deg) scaleX(0); }
      to   { opacity: 1; transform: rotate(150deg) scaleX(1); }
    }

    /* Bloom wrapper */
    .bloom {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      transform-origin: bottom center;
      animation: bloomPop 1s cubic-bezier(0.34,1.56,0.64,1) forwards;
      animation-delay: var(--bloom-delay, 1s);
      transform: scale(0) translateY(10px);
      opacity: 0;
    }
    @keyframes bloomPop {
      0%   { transform: scale(0) translateY(10px); opacity: 0; }
      60%  { opacity: 1; }
      100% { transform: scale(1) translateY(0); opacity: 1; }
    }

    /* Petal base */
    .petal {
      position: absolute;
      bottom: 0;
      transform-origin: bottom center;
      border-radius: 50% 50% 20% 20%;
      filter: drop-shadow(0 2px 6px rgba(255,100,150,0.4));
    }

    /* ── TULIP TYPE A — classic upright cup ── */
    .tulip-a .bloom { width: 60px; height: 80px; }
    .tulip-a .petal {
      width: 32px;
      height: 65px;
      background: var(--petal-color);
    }
    .tulip-a .petal:nth-child(1) { transform: rotate(-30deg) translateX(-8px); background: linear-gradient(to top, #e0527a, #f9a8c9); }
    .tulip-a .petal:nth-child(2) { transform: rotate( 30deg) translateX( 8px); background: linear-gradient(to top, #d4446e, #f7b8d2); }
    .tulip-a .petal:nth-child(3) { transform: rotate(  0deg);                  background: linear-gradient(to top, #e85c88, #ffc0d6); }
    .tulip-a .petal:nth-child(4) { transform: rotate(-15deg) translateX(-4px); background: linear-gradient(to top, #cc3d6b, #f5a0be); }
    .tulip-a .petal:nth-child(5) { transform: rotate( 15deg) translateX( 4px); background: linear-gradient(to top, #e06080, #ffcfe0); }
    .tulip-a .inner-glow {
      position: absolute;
      bottom: 5px;
      left: 50%;
      transform: translateX(-50%);
      width: 20px; height: 30px;
      background: radial-gradient(ellipse, rgba(255,230,240,0.6) 0%, transparent 80%);
      border-radius: 50%;
    }

    /* ── TULIP TYPE B — open/splayed bloom ── */
    .tulip-b .bloom { width: 80px; height: 60px; }
    .tulip-b .petal {
      width: 30px;
      height: 55px;
      border-radius: 50% 50% 30% 30%;
    }
    .tulip-b .petal:nth-child(1) { transform: rotate(-60deg) translateX(-5px); background: linear-gradient(to top, #c93870, #ff8fb2); }
    .tulip-b .petal:nth-child(2) { transform: rotate(-30deg) translateX(-3px); background: linear-gradient(to top, #d94278, #ffaac8); }
    .tulip-b .petal:nth-child(3) { transform: rotate(  0deg);                  background: linear-gradient(to top, #e8508a, #ffbdd5); }
    .tulip-b .petal:nth-child(4) { transform: rotate( 30deg) translateX( 3px); background: linear-gradient(to top, #d43d75, #ffa5c0); }
    .tulip-b .petal:nth-child(5) { transform: rotate( 60deg) translateX( 5px); background: linear-gradient(to top, #c03068, #ff8fb2); }
    .tulip-b .petal:nth-child(6) { transform: rotate(-45deg);                  background: linear-gradient(to top, #cc3a6e, #ffa0bc); }
    .tulip-b .petal:nth-child(7) { transform: rotate( 45deg);                  background: linear-gradient(to top, #d44078, #ffb0ca); }
    .tulip-b .inner-glow {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 30px; height: 20px;
      background: radial-gradient(ellipse, rgba(255,200,220,0.7) 0%, transparent 80%);
      border-radius: 50%;
    }

    /* ── TULIP TYPE C — tall elegant ── */
    .tulip-c .bloom { width: 50px; height: 90px; }
    .tulip-c .petal {
      width: 26px;
      height: 78px;
      border-radius: 60% 60% 20% 20%;
    }
    .tulip-c .petal:nth-child(1) { transform: rotate(-20deg) translateX(-6px); background: linear-gradient(to top, #b83060, #f080a8); }
    .tulip-c .petal:nth-child(2) { transform: rotate( 20deg) translateX( 6px); background: linear-gradient(to top, #c03870, #f898b8); }
    .tulip-c .petal:nth-child(3) { transform: rotate(  0deg);                  background: linear-gradient(to top, #cc4080, #faacc8); }
    .tulip-c .petal:nth-child(4) { transform: rotate(-40deg) translateX(-10px); background: linear-gradient(to top, #b03060, #ee78a0); }
    .tulip-c .petal:nth-child(5) { transform: rotate( 40deg) translateX( 10px); background: linear-gradient(to top, #b83268, #f080a8); }
    .tulip-c .inner-glow {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      width: 16px; height: 40px;
      background: radial-gradient(ellipse, rgba(255,210,230,0.5) 0%, transparent 80%);
      border-radius: 50%;
    }

    /* ── TULIP TYPE D — double/frilly ── */
    .tulip-d .bloom { width: 70px; height: 70px; }
    .tulip-d .petal {
      width: 28px;
      height: 58px;
      border-radius: 55% 55% 25% 25%;
    }
    .tulip-d .petal:nth-child(1)  { transform: rotate(-50deg) translateX(-4px); background: linear-gradient(to top, #d03870, #ff9ec0); }
    .tulip-d .petal:nth-child(2)  { transform: rotate(-25deg) translateX(-2px); background: linear-gradient(to top, #da4278, #ffa8c8); }
    .tulip-d .petal:nth-child(3)  { transform: rotate(  0deg);                  background: linear-gradient(to top, #e44e84, #ffb8d5); }
    .tulip-d .petal:nth-child(4)  { transform: rotate( 25deg) translateX( 2px); background: linear-gradient(to top, #da4278, #ffaac9); }
    .tulip-d .petal:nth-child(5)  { transform: rotate( 50deg) translateX( 4px); background: linear-gradient(to top, #d03870, #ff9ec0); }
    /* inner layer */
    .tulip-d .petal:nth-child(6)  { transform: rotate(-35deg) translateX(-2px) scale(0.75); background: linear-gradient(to top, #f060a0, #ffd0e8); }
    .tulip-d .petal:nth-child(7)  { transform: rotate(  0deg)                  scale(0.75); background: linear-gradient(to top, #f470ac, #ffd8ec); }
    .tulip-d .petal:nth-child(8)  { transform: rotate( 35deg) translateX( 2px) scale(0.75); background: linear-gradient(to top, #f060a0, #ffd0e8); }
    .tulip-d .inner-glow {
      position: absolute;
      bottom: 2px;
      left: 50%; transform: translateX(-50%);
      width: 22px; height: 28px;
      background: radial-gradient(ellipse, rgba(255,220,235,0.7) 0%, transparent 80%);
      border-radius: 50%;
    }

    /* Shimmer sparkles on petals */
    .bloom::after {
      content: '';
      position: absolute;
      inset: -10px;
      background: radial-gradient(ellipse, rgba(255,180,210,0.15) 0%, transparent 70%);
      border-radius: 50%;
      animation: pulseGlow 2.5s ease-in-out infinite alternate;
      animation-delay: var(--bloom-delay, 1s);
    }
    @keyframes pulseGlow {
      from { opacity: 0.3; transform: scale(0.95); }
      to   { opacity: 0.8; transform: scale(1.05); }
    }

    /* Gentle sway */
    .tulip { animation: sway var(--sway-dur, 4s) ease-in-out infinite alternate; animation-delay: var(--sway-del, 0s); }
    @keyframes sway {
      from { transform: rotate(var(--sway-from, -2deg)); }
      to   { transform: rotate(var(--sway-to,    2deg)); }
    }

    /* ══════════════════════════════════════
       TULIP SIZES / POSITIONS
    ══════════════════════════════════════ */
    /* Flower 1 — far left, type C, small */
    .t1 { --stem-delay:0.1s; --bloom-delay:1.1s; --leaf-delay:0.8s; --sway-dur:5.5s; --sway-del:0.3s; --sway-from:-3deg; --sway-to:1deg; margin-right: -100px; }
    .t1 .stem { height: 160px; }
    .t1 .bloom { transform: scale(0.7) translateY(10px); }

    /* Flower 2 — left-center, type A, medium */
    .t2 { --stem-delay:0.3s; --bloom-delay:1.3s; --leaf-delay:1.0s; --sway-dur:4.8s; --sway-del:0.8s; --sway-from:-2deg; --sway-to:3deg; margin-right: -100px; }
    .t2 .stem { height: 200px; }

    /* Flower 3 — center, type D, large */
    .t3 { --stem-delay:0s; --bloom-delay:1.0s; --leaf-delay:0.7s; --sway-dur:4.2s; --sway-del:0s; --sway-from:-1.5deg; --sway-to:1.5deg; z-index:100; }
    .t3 .stem { height: 220px; width: 8px; }
    .t3 .bloom { transform: scale(0) translateY(10px); }

    /* Flower 4 — right-center, type B, medium */
    .t4 { --stem-delay:0.2s; --bloom-delay:1.2s; --leaf-delay:0.9s; --sway-dur:5.1s; --sway-del:0.5s; --sway-from:-2deg; --sway-to:2.5deg; margin-left: -100px; }
    .t4 .stem { height: 190px; }

    /* Flower 5 — far right, type C, small */
    .t5 { --stem-delay:0.4s; --bloom-delay:1.4s; --leaf-delay:1.1s; --sway-dur:5.8s; --sway-del:1s; --sway-from:-1deg; --sway-to:3deg; margin-left: -100px; }
    .t5 .stem { height: 155px; }
    .t5 .bloom { transform: scale(0) translateY(10px); }

    /* tiny side tulips */
    .t0 { --stem-delay:0.5s; --bloom-delay:1.5s; --sway-dur:6s; --sway-del:1.2s; --sway-from:-3deg; --sway-to:0deg; margin-right: 100px; }
    .t0 .stem { height: 120px; width: 4px; }
    .t0 .bloom { transform: scale(0) translateY(10px); }

    .t6 { --stem-delay:0.6s; --bloom-delay:1.6s; --sway-dur:5.2s; --sway-del:0.9s; --sway-from:0deg; --sway-to:3deg; margin-left: 100px; }
    .t6 .stem { height: 130px; width: 4px; }
    .t6 .bloom { transform: scale(0) translateY(10px); }

    /* ══════════════════════════════════════
       FLOATING HEARTS
    ══════════════════════════════════════ */
    .hearts-container {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 100vh;
      pointer-events: none;
      overflow: hidden;
    }

    .heart {
      position: absolute;
      bottom: -40px;
      font-size: var(--size, 20px);
      opacity: 0;
      animation: floatUp var(--dur, 6s) ease-in forwards;
      animation-delay: var(--delay, 0s);
      left: var(--x, 50%);
      filter: drop-shadow(0 0 6px rgba(255,100,150,0.6));
    }

    @keyframes floatUp {
      0%   { opacity: 0;   transform: translateY(0)      rotate(0deg)   scale(0.5); }
      10%  { opacity: 0.9; transform: translateY(-30px)  rotate(-10deg) scale(1);   }
      50%  { opacity: 0.7; transform: translateY(var(--mid-y,-200px)) rotate(15deg) scale(var(--mid-s, 1.1)); }
      90%  { opacity: 0.2; transform: translateY(var(--top-y,-500px)) rotate(-5deg) scale(0.8); }
      100% { opacity: 0;   transform: translateY(var(--end-y,-650px)) rotate(10deg) scale(0.5); }
    }

    /* ══════════════════════════════════════
       AMBIENT GLOW PARTICLES
    ══════════════════════════════════════ */
    .particle {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,150,200,0.8), transparent);
      pointer-events: none;
      animation: particleDrift var(--pdur,8s) ease-in-out infinite;
      animation-delay: var(--pdel,0s);
      opacity: 0;
    }
    @keyframes particleDrift {
      0%   { opacity:0; transform: translateY(0) translateX(0) scale(0.5); }
      20%  { opacity:0.6; }
      80%  { opacity:0.3; }
      100% { opacity:0; transform: translateY(-300px) translateX(var(--px,20px)) scale(1.5); }
    }

    /* ══════════════════════════════════════
       MOON
    ══════════════════════════════════════ */
    .moon {
      position: fixed;
      top: 60px; right: 120px;
      width: 70px; height: 70px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #ffe4f0, #ffb8d8, #e080a8);
      box-shadow: 0 0 30px rgba(255,160,200,0.5), 0 0 80px rgba(255,120,170,0.2);
      animation: moonGlow 4s ease-in-out infinite alternate;
    }
    @keyframes moonGlow {
      from { box-shadow: 0 0 30px rgba(255,160,200,0.5), 0 0 80px rgba(255,120,170,0.2); }
      to   { box-shadow: 0 0 50px rgba(255,160,200,0.8), 0 0 120px rgba(255,120,170,0.4); }
    }

    /* ══════════════════════════════════════
       TITLE
    ══════════════════════════════════════ */
    .title {
      position: fixed;
      top: 30px; left: 50%;
      transform: translateX(-50%);
      font-size: 1.4rem;
      color: rgba(255,190,220,0.85);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      font-weight: 300;
      text-shadow: 0 0 20px rgba(255,100,150,0.6);
      animation: fadeTitle 2s ease-out forwards;
      opacity: 0;
    }
    @keyframes fadeTitle {
      from { opacity:0; transform: translateX(-50%) translateY(-10px); }
      to   { opacity:1; transform: translateX(-50%) translateY(0); }
    }
  </style>
</head>
<body>

<div class="sky"></div>
<div class="stars" id="stars"></div>
<div class="moon"></div>
<div class="ground"></div>
<div class="title">tulips garden</div>

<!-- Hearts container -->
<div class="hearts-container" id="hearts"></div>

<!-- Scene -->
<div class="scene">

  <!-- Tulip 0 — tiny far-left, type C -->
  <div class="tulip t0">
    <div class="bloom tulip-c">
      <div class="petal"></div><div class="petal"></div><div class="petal"></div>
      <div class="petal"></div><div class="petal"></div>
      <div class="inner-glow"></div>
    </div>
    <div class="stem">
      <div class="stem-leaf right" style="--leaf-top:40%"></div>
    </div>
  </div>

  <!-- Tulip 1 — left, type C -->
  <div class="tulip t1">
    <div class="bloom tulip-c">
      <div class="petal"></div><div class="petal"></div><div class="petal"></div>
      <div class="petal"></div><div class="petal"></div>
      <div class="inner-glow"></div>
    </div>
    <div class="stem">
      <div class="stem-leaf right" style="--leaf-top:35%"></div>
      <div class="stem-leaf left"  style="--leaf-top:60%"></div>
    </div>
  </div>

  <!-- Tulip 2 — left-center, type A -->
  <div class="tulip t2">
    <div class="bloom tulip-a">
      <div class="petal"></div><div class="petal"></div><div class="petal"></div>
      <div class="petal"></div><div class="petal"></div>
      <div class="inner-glow"></div>
    </div>
    <div class="stem">
      <div class="stem-leaf right" style="--leaf-top:30%"></div>
      <div class="stem-leaf left"  style="--leaf-top:55%"></div>
    </div>
  </div>

  <!-- Tulip 3 — center HERO, type D double -->
  <div class="tulip t3">
    <div class="bloom tulip-d">
      <div class="petal"></div><div class="petal"></div><div class="petal"></div>
      <div class="petal"></div><div class="petal"></div>
      <div class="petal"></div><div class="petal"></div><div class="petal"></div>
      <div class="inner-glow"></div>
    </div>
    <div class="stem">
      <div class="stem-leaf right" style="--leaf-top:25%"></div>
      <div class="stem-leaf left"  style="--leaf-top:50%"></div>
    </div>
  </div>

  <!-- Tulip 4 — right-center, type B open -->
  <div class="tulip t4">
    <div class="bloom tulip-b">
      <div class="petal"></div><div class="petal"></div><div class="petal"></div>
      <div class="petal"></div><div class="petal"></div>
      <div class="petal"></div><div class="petal"></div>
      <div class="inner-glow"></div>
    </div>
    <div class="stem">
      <div class="stem-leaf right" style="--leaf-top:32%"></div>
      <div class="stem-leaf left"  style="--leaf-top:58%"></div>
    </div>
  </div>

  <!-- Tulip 5 — right, type C -->
  <div class="tulip t5">
    <div class="bloom tulip-c">
      <div class="petal"></div><div class="petal"></div><div class="petal"></div>
      <div class="petal"></div><div class="petal"></div>
      <div class="inner-glow"></div>
    </div>
    <div class="stem">
      <div class="stem-leaf right" style="--leaf-top:38%"></div>
      <div class="stem-leaf left"  style="--leaf-top:62%"></div>
    </div>
  </div>

  <!-- Tulip 6 — tiny far-right, type A -->
  <div class="tulip t6">
    <div class="bloom tulip-a">
      <div class="petal"></div><div class="petal"></div><div class="petal"></div>
      <div class="petal"></div><div class="petal"></div>
      <div class="inner-glow"></div>
    </div>
    <div class="stem">
      <div class="stem-leaf left" style="--leaf-top:45%"></div>
    </div>
  </div>
<!-- Tulip 0 — tiny far-left, type C -->
  <div class="tulip t0">
    <div class="bloom tulip-c">
      <div class="petal"></div><div class="petal"></div><div class="petal"></div>
      <div class="petal"></div><div class="petal"></div>
      <div class="inner-glow"></div>
    </div>
    <div class="stem">
      <div class="stem-leaf right" style="--leaf-top:40%"></div>
    </div>
  </div>

  <!-- Tulip 1 — left, type C -->
  <div class="tulip t1">
    <div class="bloom tulip-c">
      <div class="petal"></div><div class="petal"></div><div class="petal"></div>
      <div class="petal"></div><div class="petal"></div>
      <div class="inner-glow"></div>
    </div>
    <div class="stem">
      <div class="stem-leaf right" style="--leaf-top:35%"></div>
      <div class="stem-leaf left"  style="--leaf-top:60%"></div>
    </div>
  </div>

  <!-- Tulip 2 — left-center, type A -->
  <div class="tulip t2">
    <div class="bloom tulip-a">
      <div class="petal"></div><div class="petal"></div><div class="petal"></div>
      <div class="petal"></div><div class="petal"></div>
      <div class="inner-glow"></div>
    </div>
    <div class="stem">
      <div class="stem-leaf right" style="--leaf-top:30%"></div>
      <div class="stem-leaf left"  style="--leaf-top:55%"></div>
    </div>
  </div>

  <!-- Tulip 3 — center HERO, type D double -->
  <div class="tulip t3">
    <div class="bloom tulip-d">
      <div class="petal"></div><div class="petal"></div><div class="petal"></div>

<script>
  /* ── Stars ── */
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 120; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2.5 + 0.5;
    s.style.cssText = `
      width:${size}px; height:${size}px;
      top:${Math.random()*80}%;
      left:${Math.random()*100}%;
      --dur:${(Math.random()*3+2).toFixed(1)}s;
      --del:${(Math.random()*4).toFixed(1)}s;
    `;
    starsEl.appendChild(s);
  }

  /* ── Floating Hearts ── */
  const heartsEl = document.getElementById('hearts');
  const heartEmojis = ['❤️','💕','💗','💖','💝','💓','💞','🩷'];

  function spawnHeart() {
    const h = document.createElement('div');
    h.className = 'heart';
    const x = (Math.random() * 80 + 10).toFixed(1);
    const size = (Math.random() * 22 + 12).toFixed(0);
    const dur  = (Math.random() * 5 + 5).toFixed(1);
    const midY = -(Math.random() * 200 + 150);
    const topY = -(Math.random() * 200 + 400);
    const endY = -(Math.random() * 100 + 600);
    const midS = (Math.random() * 0.4 + 0.9).toFixed(2);
    h.textContent = heartEmojis[Math.floor(Math.random() * heartEmojis.length)];
    h.style.cssText = `
      --x:${x}%;
      --size:${size}px;
      --dur:${dur}s;
      --delay:0s;
      --mid-y:${midY}px;
      --top-y:${topY}px;
      --end-y:${endY}px;
      --mid-s:${midS};
      left:${x}%;
      font-size:${size}px;
      animation-duration:${dur}s;
    `;
    heartsEl.appendChild(h);
    setTimeout(() => h.remove(), parseFloat(dur) * 1000 + 200);
  }

  /* Initial burst after bloom */
  setTimeout(() => {
    for (let i = 0; i < 12; i++) {
      setTimeout(spawnHeart, i * 180);
    }
    // Continuous spawning
    setInterval(spawnHeart, 600);
  }, 1400);

  /* ── Ambient glow particles ── */
  const scene = document.querySelector('.scene');
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = Math.random() * 12 + 4;
    p.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random()*100}%;
      bottom:${Math.random()*30}%;
      --pdur:${(Math.random()*5+6).toFixed(1)}s;
      --pdel:${(Math.random()*6).toFixed(1)}s;
      --px:${(Math.random()*60-30).toFixed(0)}px;
    `;
    document.querySelector('.sky').appendChild(p);
  }
</script>
