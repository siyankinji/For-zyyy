<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Gift For You</title>
    <style>
        :root {
        --accent: #ff4fa0;
        --text: #f9eaff;
        --glass: rgba(255, 255, 255, 0.1);
        --glass-border: rgba(255, 255, 255, 0.24);
      }


      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Poppins", "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at 85% 20%, #f72798, transparent 42%),
          linear-gradient(320deg, #f72798, #1a1a1d);
        display: grid;
        place-items: center;
        color: var(--text);
        padding: 20px;
      }

      .card {
        width: min(500px, 100%);
        background: linear-gradient(160deg, rgba(255, 255, 255, 0.22), rgba(255, 255, 255, 0.06));
        backdrop-filter: blur(22px);
        border: 1px solid var(--glass-border);
        border-radius: 34px;
        box-shadow: 0 30px 60px rgba(2, 6, 30, 0.45), inset 0 0 0 1px rgba(255, 255, 255, 0.06);
        text-align: center;
        padding: 30px 20px 34px;
      }

      .hero-gif {
        width: 125px;
        height: 125px;
        object-fit: cover;
        border-radius: 50%;
        border: 4px solid #ffd1e8;
        margin-bottom: 18px;
      }

      h1 {
        margin: 0 0 22px;
        font-size: clamp(1.6rem, 3.8vw, 2rem);
        line-height: 1.3;
      }

      .actions {
        display: flex;
        justify-content: center;
        gap: 12px;
        align-items: center;
        flex-wrap: wrap;
      }

      button {
        border: none;
        border-radius: 999px;
        padding: 11px 24px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.18s ease;
      }

      #yesBtn {
        background: linear-gradient(120deg, #ff6eb6, var(--accent));
        color: #fff;
        box-shadow: 0 10px 18px rgba(255, 79, 160, 0.28);
      }

      #noBtn {
        background: #ffe4f1;
        color: #9b4d79;
      }

      button:hover { transform: translateY(-2px); }

     .hint {
        margin-top: 16px;
        font-size: 0.95rem;
        color: rgba(249, 234, 255, 0.76);
      }
    </style>
  </head>
  <body>
    <main class="card">
      <img id="heroGif" src="CatFlowers.gif" alt="Cute cat" class="hero-gif" />
      <h1 id="questionText">Hello baby, do you want to see my gift?</h1>
      <div class="actions">
        <button id="yesBtn" type="button">Yes</button>
        <button id="noBtn" type="button">No</button>
      </div>
      <p class="hint">Choose wisely, baby 💖</p>
    </main>

    <script>
      const questionText = document.getElementById("questionText");
      const heroGif = document.getElementById("heroGif");
      const yesBtn = document.getElementById("yesBtn");
      const noBtn = document.getElementById("noBtn");

 let noCount = Number(sessionStorage.getItem("noCount") || 0);

      const updateNoState = () => {
        if (noCount >= 5) {
          questionText.textContent = "Okay... now I'm crying 🥺";
          heroGif.src = "CatSad.gif";
          heroGif.alt = "Crying cat";
        } else if (noCount === 0) {
          questionText.textContent = "Hello baby, do you want to see my gift?";
          heroGif.src = "CatFlowers.gif";
          heroGif.alt = "Cute cat";
        } else if (noCount === 1) {
          questionText.textContent = "WHY?";
          heroGif.src = "CatFlowers.gif";
          heroGif.alt = "Cute cat";
        } else {
          questionText.textContent = "CLICK YES!";
          heroGif.src = "CatFlowers.gif";
          heroGif.alt = "Cute cat";
        }

        const growth = 1 + noCount * 0.2;
        yesBtn.style.transform = `scale(${growth})`;
      };

      updateNoState();

      yesBtn.addEventListener("click", () => {
        sessionStorage.removeItem("noCount");
        window.location.href = "pin.html";
      });

      noBtn.addEventListener("click", () => {
        noCount += 1;
        sessionStorage.setItem("noCount", String(noCount));
        updateNoState();
      });
    </script>
  </body>
</html>
