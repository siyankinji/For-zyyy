<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pink Tulip Bloom</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="scene">
    <div class="glow"></div>
    <div class="hearts" aria-hidden="true"></div>

    <div class="tulip-field">
      <div class="tulip tulip--left">
        <div class="stem"></div>
        <div class="leaf leaf--left"></div>
        <div class="leaf leaf--right"></div>
        <div class="bloom">
          <span class="petal petal--left"></span>
          <span class="petal petal--center"></span>
          <span class="petal petal--right"></span>
        </div>
      </div>

      <div class="tulip tulip--center">
        <div class="stem"></div>
        <div class="leaf leaf--left"></div>
        <div class="leaf leaf--right"></div>
        <div class="bloom">
          <span class="petal petal--left"></span>
          <span class="petal petal--center"></span>
          <span class="petal petal--right"></span>
        </div>
      </div>

      <div class="tulip tulip--right">
        <div class="stem"></div>
        <div class="leaf leaf--left"></div>
        <div class="leaf leaf--right"></div>
        <div class="bloom">
          <span class="petal petal--left"></span>
          <span class="petal petal--center"></span>
          <span class="petal petal--right"></span>
        </div>
      </div>
    </div>
  </div>

  <script src="./script.js"></script>
</body>
</html>
