<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Baby Lock</title>
    <style>
      :root {
        --soft-bg: #fff3fa;
        --soft-card: #fff;
        --line: #ffd3ea;
        --pink: #ff4fa0;
        --text: #7a3f63;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Poppins", "Segoe UI", sans-serif;
        background: radial-gradient(circle at top right, #ffe1f1, var(--soft-bg) 48%, #ffe8f5);
        color: var(--text);
        padding: 20px;
      }
      .phone {
        width: min(380px, 100%);
        background: var(--soft-card);
        border-radius: 30px;
        border: 2px solid var(--line);
        box-shadow: 0 22px 45px rgba(255, 105, 180, 0.2);
        padding: 26px 20px 24px;
        text-align: center;
      }
      .top-gif {
        width: 90px;
        height: 90px;
        border-radius: 50%;
        object-fit: cover;
        border: 3px solid #ffd2e8;
        margin-bottom: 12px;
      }
      h1 { margin: 0; font-size: 1.5rem; }
      .subtitle { margin: 7px 0 18px; color: #a25a84; }
      .dots {
        display: flex;
        justify-content: center;
        gap: 12px;
        margin: 0 0 18px;
      }
      .dot {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        border: 2px solid #ffc5e2;
        background: transparent;
      }
      .dot.filled { background: var(--pink); border-color: var(--pink); }
      .pad {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
      }
      .pin-btn {
        border: none;
        border-radius: 15px;
        padding: 14px 0;
        font-size: 1.05rem;
        font-weight: 700;
        color: #8d4671;
        background: #ffeaf5;
        cursor: pointer;
      }
      .pin-btn:active { transform: scale(0.96); }
      .danger {
        display: none;
      }

      .wrong-popup {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(255, 105, 180, 0.2);
        backdrop-filter: blur(8px);
        align-items: center;
        justify-content: center;
        padding: 20px;
        z-index: 20;
      }

      .wrong-popup.active {
        display: flex;
      }

      .popup-card {
        width: min(420px, 100%);
        background: linear-gradient(
          135deg,
          rgba(255, 240, 248, 0.95) 0%,
          rgba(255, 224, 233, 0.95) 100%
        );
        border: 2px solid rgba(255, 105, 180, 0.25);
        box-shadow: 0 20px 50px rgba(255, 105, 180, 0.35);
        border-radius: 28px;
        text-align: center;
        padding: 30px 24px;
        animation: popIn 0.35s ease;
      }

      .popup-gif {
        width: 96px;
        height: 96px;
        object-fit: cover;
        border-radius: 50%;
        border: 3px solid rgba(255, 182, 193, 0.6);
        box-shadow: 0 10px 20px rgba(255, 105, 180, 0.25);
        margin: 0 auto 14px;
        display: block;
      }

      .popup-card h2 {
        margin: 0 0 10px;
        background: linear-gradient(135deg, #ff1493 0%, #ff69b4 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .popup-card p {
        margin: 0 0 20px;
        color: #9a4a77;
      }

      .popup-card button {
        border: none;
        border-radius: 999px;
        padding: 12px 28px;
        background: linear-gradient(135deg, #ff1493 0%, #ff69b4 100%);
        color: #fff;
        font-weight: 700;
        cursor: pointer;
        box-shadow: 0 8px 25px rgba(255, 20, 147, 0.35),
          0 2px 8px rgba(255, 105, 180, 0.2);
      }

      .popup-card button:hover {
        transform: translateY(-2px);
      }

      @keyframes popIn {
        from {
          opacity: 0;
          transform: translateY(10px) scale(0.96);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }
    </style>
  </head>
  <body>
    <section class="phone">
      <img src="CatLetter.gif" alt="Cute cat" class="top-gif" />
      <h1>for my baby’s eyes only</h1>
      <p class="subtitle">Enter our monthsary to continue.</p>

      <div class="dots" id="dots">
        <span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span>
      </div>

      <div class="pad" id="pad">
        <button class="pin-btn" data-value="1">1</button>
        <button class="pin-btn" data-value="2">2</button>
        <button class="pin-btn" data-value="3">3</button>
        <button class="pin-btn" data-value="4">4</button>
        <button class="pin-btn" data-value="5">5</button>
        <button class="pin-btn" data-value="6">6</button>
        <button class="pin-btn" data-value="7">7</button>
        <button class="pin-btn" data-value="8">8</button>
        <button class="pin-btn" data-value="9">9</button>
        <button class="pin-btn" data-action="clear">⌫</button>
        <button class="pin-btn" data-value="0">0</button>
        <button class="pin-btn" data-action="enter">↵</button>
      </div>

      <p id="error" class="danger"></p>
    </section>

    <div class="wrong-popup" id="wrongPopup" role="dialog" aria-modal="true" aria-labelledby="wrongTitle">
      <div class="popup-card">
        <img src="CatSad.gif" alt="Sad cat" class="popup-gif" />
        <h2 id="wrongTitle">Wrong Password</h2>
        <p>you sure you’re my baby? try one more time</p>
        <button id="tryAgain" type="button">Try Again</button>
      </div>
    </div>

    <script>
      const CORRECT_PIN = "0825";
      const dots = Array.from(document.querySelectorAll(".dot"));
      const pad = document.getElementById("pad");
      const tryAgain = document.getElementById("tryAgain");
      const wrongPopup = document.getElementById("wrongPopup");

      let pin = "";

      function renderDots() {
        dots.forEach((dot, idx) => dot.classList.toggle("filled", idx < pin.length));
      }

      function resetAttempt() {
        pin = "";
        renderDots();
        wrongPopup.classList.remove("active");
      }

      function submitPin() {
        if (pin.length !== 4) return;

        if (pin === CORRECT_PIN) {
          window.location.href = "gift.html";
          return;
        }

        wrongPopup.classList.add("active");
      }

      pad.addEventListener("click", (event) => {
        const button = event.target.closest("button");
        if (!button) return;

        if (button.dataset.action === "clear") {
          pin = pin.slice(0, -1);
          renderDots();
          return;
        }

        if (button.dataset.action === "enter") {
          submitPin();
          return;
        }

        const value = button.dataset.value;
        if (!value || pin.length >= 4) return;

        pin += value;
        renderDots();

        if (pin.length === 4) {
          submitPin();
        }
      });

      tryAgain.addEventListener("click", resetAttempt);
    </script>
  </body>
</html>
