<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Baby Lock</title>
    <style>
      :root {
        --lock-bg: #0f1224;
        --lock-bg-soft: #1d2242;
        --pink: #ff4fa0;
        --glass: rgba(255, 255, 255, 0.1);
        --glass-border: rgba(255, 255, 255, 0.24);
        --text: #f9eaff;
        --muted: rgba(249, 234, 255, 0.76);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "Poppins", "Segoe UI", sans-serif;
        background: 
          radial-gradient(circle at 85% 20%, #F72798, transparent 42%),
          linear-gradient(320deg, #F72798, #1A1A1D);
        color: var(--text);
        padding: 16px;
      }
      .phone {
        width: min(380px, 100%);
        background: linear-gradient(160deg, rgba(255, 255, 255, 0.22), rgba(255, 255, 255, 0.06));
        backdrop-filter: blur(22px);
        border-radius: 34px;
        border: 1px solid var(--glass-border);
        box-shadow: 0 30px 60px rgba(2, 6, 30, 0.45), inset 0 0 0 1px rgba(255, 255, 255, 0.06);
        padding: 20px 20px 26px;
        text-align: center;
        position: relative;
        overflow: hidden;
      }
      .phone::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(120deg, rgba(255, 255, 255, 0.14), transparent 42%);
        pointer-events: none;
      }
      .status-time {
        font-size: 3.5rem;
        line-height: 1;
        margin: 16px 0 4px;
        letter-spacing: 0.04em;
        font-weight: 600;
        text-shadow: 0 8px 25px rgba(0, 0, 0, 0.32);
      }
      .status-date {
        margin: 0 0 18px;
        color: var(--muted);
        font-size: 0.98rem;
      }
      .top-gif {
        width: 84px;
        height: 84px;
        border-radius: 50%;
        object-fit: cover;
        border: 2px solid rgba(255, 255, 255, 0.45);
        box-shadow: 0 10px 22px rgba(0, 0, 0, 0.35);
        margin-bottom: 10px;
      }
      h1 { margin: 0; font-size: 1.34rem; }
      .subtitle { margin: 7px 0 18px; color: var(--muted); }
      .dots {
        display: flex;
        justify-content: center;
        gap: 12px;
        margin: 0 0 18px;
      }
      .dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        border: 1.5px solid rgba(255, 255, 255, 0.5);
        background: transparent;
        transition: all 0.2s ease;
      }
      .dot.filled {
        background: #fff;
        border-color: #fff;
        transform: scale(1.1);
      }
      .pad {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
        position: relative;
        z-index: 2;
      }
      .pin-btn {
        position: relative;
        border: 1px solid rgba(255, 255, 255, 0.45);
        border-radius: 50%;
        width: 76px;
        height: 76px;
        margin-inline: auto;
        font-size: 1.5rem;
        font-weight: 500;
        color: #ffffff;
        background: var(--glass);
        cursor: pointer;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.4), 0 10px 18px rgba(0, 0, 0, 0.22);
        transition: transform 0.18s ease, box-shadow 0.2s ease, background-color 0.25s ease;
        overflow: hidden;
      }
      .pin-btn:active { transform: scale(0.95); }
      .pin-btn.pressed {
        animation: btnPulse 0.35s ease;
      }
      .pin-btn::after {
        content: "";
        position: absolute;
        inset: 14%;
        border-radius: 50%;
        border: 1px solid rgba(255, 255, 255, 0.3);
      }

      .pin-btn .ripple {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 4px;
        height: 4px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.65);
        transform: translate(-50%, -50%);
        animation: rippleBurst 0.45s ease-out;
        pointer-events: none;
      }

      @keyframes btnPulse {
        0% { transform: scale(1); }
        50% { transform: scale(0.9); background-color: rgba(255, 255, 255, 0.3); }
        100% { transform: scale(1); }
      }

      @keyframes rippleBurst {
        0% {
          opacity: 0.8;
          width: 8px;
          height: 8px;
        }
        100% {
          opacity: 0;
          width: 105px;
          height: 105px;
        }
      }
      .danger {
        display: none;
      }

      .wrong-popup {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(255, 105, 180, 0.2);
        backdrop-filter: blur(8px);
        align-items: center;
        justify-content: center;
        padding: 20px;
        z-index: 20;
      }

      .wrong-popup.active {
        display: flex;
      }

      .popup-card {
        width: min(420px, 100%);
        background: linear-gradient(
          135deg,
          rgba(255, 240, 248, 0.95) 0%,
          rgba(255, 224, 233, 0.95) 100%
        );
        border: 2px solid rgba(255, 105, 180, 0.25);
        box-shadow: 0 20px 50px rgba(255, 105, 180, 0.35);
        border-radius: 28px;
        text-align: center;
        padding: 30px 24px;
        animation: popIn 0.35s ease;
      }

      .popup-gif {
        width: 96px;
        height: 96px;
        object-fit: cover;
        border-radius: 50%;
        border: 3px solid rgba(255, 182, 193, 0.6);
        box-shadow: 0 10px 20px rgba(255, 105, 180, 0.25);
        margin: 0 auto 14px;
        display: block;
      }

      .popup-card h2 {
        margin: 0 0 10px;
        background: linear-gradient(135deg, #ff1493 0%, #ff69b4 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .popup-card p {
        margin: 0 0 20px;
        color: #9a4a77;
      }

      .popup-card button {
        border: none;
        border-radius: 999px;
        padding: 12px 28px;
        background: linear-gradient(135deg, #ff1493 0%, #ff69b4 100%);
        color: #fff;
        font-weight: 700;
        cursor: pointer;
        box-shadow: 0 8px 25px rgba(255, 20, 147, 0.35),
          0 2px 8px rgba(255, 105, 180, 0.2);
      }

      .popup-card button:hover {
        transform: translateY(-2px);
      }

      @keyframes popIn {
        from {
          opacity: 0;
          transform: translateY(10px) scale(0.96);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }
    </style>
  </head>
  <body>
    <section class="phone">
      <h2 class="status-time">10:28</h2>
      <p class="status-date">Sunday, August 25</p>
      <img src="CatLetter.gif" alt="Cute cat" class="top-gif" />
      <h1>for my baby’s eyes only</h1>
      <p class="subtitle">Enter our monthsary to continue.</p>

      <div class="dots" id="dots">
        <span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span>
      </div>

      <div class="pad" id="pad">
        <button class="pin-btn" data-value="1">1</button>
        <button class="pin-btn" data-value="2">2</button>
        <button class="pin-btn" data-value="3">3</button>
        <button class="pin-btn" data-value="4">4</button>
        <button class="pin-btn" data-value="5">5</button>
        <button class="pin-btn" data-value="6">6</button>
        <button class="pin-btn" data-value="7">7</button>
        <button class="pin-btn" data-value="8">8</button>
        <button class="pin-btn" data-value="9">9</button>
        <button class="pin-btn" data-action="clear">⌫</button>
        <button class="pin-btn" data-value="0">0</button>
        <button class="pin-btn" data-action="enter">↵</button>
      </div>

      <p id="error" class="danger"></p>
    </section>

    <div class="wrong-popup" id="wrongPopup" role="dialog" aria-modal="true" aria-labelledby="wrongTitle">
      <div class="popup-card">
        <img src="CatSad.gif" alt="Sad cat" class="popup-gif" />
        <h2 id="wrongTitle">Wrong Password</h2>
        <p>you sure you’re my baby? try one more time</p>
        <button id="tryAgain" type="button">Try Again</button>
      </div>
    </div>

    <script>
      const CORRECT_PIN = "0917";
      const dots = Array.from(document.querySelectorAll(".dot"));
      const pad = document.getElementById("pad");
      const tryAgain = document.getElementById("tryAgain");
      const wrongPopup = document.getElementById("wrongPopup");

      let pin = "";

      function renderDots() {
        dots.forEach((dot, idx) => dot.classList.toggle("filled", idx < pin.length));
      }

      function resetAttempt() {
        pin = "";
        renderDots();
        wrongPopup.classList.remove("active");
      }

      function submitPin() {
        if (pin.length !== 4) return;

        if (pin === CORRECT_PIN) {
          window.location.href = "gift.html";
          return;
        }

        wrongPopup.classList.add("active");
      }

      pad.addEventListener("click", (event) => {
        const button = event.target.closest("button");
        if (!button) return;

        button.classList.add("pressed");
        const ripple = document.createElement("span");
        ripple.className = "ripple";
        button.appendChild(ripple);

        setTimeout(() => {
          button.classList.remove("pressed");
          ripple.remove();
        }, 420);

        if (button.dataset.action === "clear") {
          pin = pin.slice(0, -1);
          renderDots();
          return;
        }

        if (button.dataset.action === "enter") {
          submitPin();
          return;
        }

        const value = button.dataset.value;
        if (!value || pin.length >= 4) return;

        pin += value;
        renderDots();

        if (pin.length === 4) {
          submitPin();
        }
      });

      tryAgain.addEventListener("click", resetAttempt);
    </script>
  </body>
</html>
